<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDI animado - Seleção de Unidade</title>
    <link href="https://fonts.googleapis.com/css2?family=Droid+Serif&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/chunkfive" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- ESTILOS EXCLUSIVOS DESTA PÁGINA -->
    <style>
        .content .link-container {
            width: 320px; /* <--- AUMENTE OU DIMINUA AQUI */
            max-width: 90vw; /* Trava de segurança para não vazar da tela em celulares pequenos */
            justify-content: center; /* Mantém o ícone e o texto centralizados no novo espaço */
        }

        .content .link-container a {
            flex-grow: 0; /* Evita que o link empurre o ícone para a borda */
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="logo">
        <img src="./logo.png" alt="logo">
    </div>

    <!-- Luzes de fundo -->
    <div class="blur-light light1"></div>
    <div class="blur-light light2"></div>

    <!-- Conteúdo principal -->
    <div class="content">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: #fff; font-family: 'Chunkfive', 'Droid Serif', serif; font-size: 22px; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                Escolha a sua unidade:
            </h2>
        </div>

        <div class="link-container">
            <i class="fas fa-location-dot" style="color: #fff;"></i>
            <a href="periperi.html">Unidade Periperi</a>
        </div>

        <div class="link-container">
            <i class="fas fa-location-dot" style="color: #fff;"></i>
            <a href="vconquista.html">Vitória da Conquista</a>
        </div>
        
    </div>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="./bg/bg-pizzaria.mp4" type="video/mp4">
        Seu navegador não suporta vídeos em HTML5.
    </video>

    <script src="./script.js"></script>
</body>

</html>
